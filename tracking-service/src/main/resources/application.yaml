server:
  port: 8084

spring:
  application:
    name: tracking-service

  datasource:
    url: jdbc:postgresql://localhost:5432/offerwall_tracking
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

app:
  rabbitmq:
    exchange: offerwall.exchange
    routing-key: offer.eligibility.checked
    queue: offer.eligibility.checked.queue

offerwall:
  tracking:
    retention-days: 365
    default-page-size: 50
    max-page-size: 200
