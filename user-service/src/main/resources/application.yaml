server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/offerwall_user
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

offerwall:
  auth:
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    jwt:
      issuer: offerwall-user-service
      audience: offerwall-api
      key-id: local-dev
    refresh-cookie:
      name: refresh_token
      secure: false
      same-site: Lax
      path: /
  user:
    defaults:
      notification-email-enabled: false
      notification-in-app-enabled: true
  security:
    internal:
      api-key:
  tracking:
    enabled: true
    base-url: http://localhost:8084
    fail-on-error: false
  clients:
    eligibility:
      base-url: http://localhost:8083
      internal-api-key:
