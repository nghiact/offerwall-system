server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/offerwall_notification
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

app:
  rabbitmq:
    exchange: offerwall.exchange
    routing-key: notification.event
    queue: notification.event.queue

offerwall:
  clients:
    tracking:
      base-url: http://localhost:8084
    offer:
      base-url: http://localhost:8082
    user:
      base-url: http://localhost:8081
  security:
    jwt:
      issuer: offerwall-user-service
      audience: offerwall-api
      require-signature: false
    internal:
      api-key: ${OFFERWALL_INTERNAL_API_KEY:local-dev-internal-key}
