server:
  port: 8080

spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: current-user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/me/**
              filters:
                - StripPrefix=1

            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**

            - id: offer-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/offers/**

            - id: offer-category-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/offer-categories/**

            - id: eligibility-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/eligibility/**

            - id: tracking-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/tracking/**

            - id: card-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/cards/**

            - id: notification-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/notifications/**
